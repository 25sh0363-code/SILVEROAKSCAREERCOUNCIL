<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Career Laboratory Resource Website</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Cinzel:wght@600;700&display=swap" rel="stylesheet">

<style>

:root{
  --primary:#B80F2E;--primary-dark:#8F0A22;--primary-press:#71071A;--primary-soft:#FDECEF;
  --accent:#D61A3C;--success:#13795B;--danger:#B42318;
  --text:#181818;--muted:#4B5563;--bg:#FAFBFD;--card:#FFFFFF;--border:#D4D9E0;
  --radius:10px;--radius-sm:8px;
  --shadow:0 8px 24px rgba(16,24,40,.08);
  --shadow-hover:0 14px 34px rgba(16,24,40,.16);
  --t:.3s cubic-bezier(0.4,0,0.2,1);
  --font:'Montserrat','Segoe UI',system-ui,-apple-system,sans-serif;
  --font-h:'Cinzel','Georgia',serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font);color:var(--text);background:var(--bg);font-size:16px;line-height:1.6;min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;overflow-x:hidden}
img{max-width:100%;display:block;border-radius:8px}
a{color:var(--primary);text-decoration:none;transition:color var(--t),background-color var(--t),border-color var(--t)}
a:hover{color:var(--primary-dark)}
main{flex:1}

h1,h2,h3,h4,h5,h6{font-family:var(--font-h);font-weight:700;line-height:1.2;color:var(--text);letter-spacing:-.02em}
h1{font-size:clamp(2rem,4vw,3.5rem);margin-bottom:16px}
h2{font-size:clamp(1.5rem,3vw,2.4rem);margin-bottom:12px}
h3{font-size:clamp(1.15rem,2vw,1.6rem);margin-bottom:10px}
h4{font-size:1.1rem;margin-bottom:8px}
p{margin-bottom:12px;color:var(--muted);line-height:1.6}

.container{max-width:1200px;margin:0 auto;padding:0 24px}
.section{padding:72px 0;background:linear-gradient(180deg,#FFFFFF 0%,#FFF8F9 100%)}
.section:nth-of-type(even){background:linear-gradient(180deg,#FFFFFF 0%,#F7F9FC 100%)}
.grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:24px;margin-top:32px;max-width:1200px;margin-left:auto;margin-right:auto}
.flex-between{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.mt-2{margin-top:16px}.mt-3{margin-top:32px}.mt-4{margin-top:48px}.mb-2{margin-bottom:16px}.mb-3{margin-bottom:32px}.mb-4{margin-bottom:48px}
.hidden{display:none!important}

.spotlight-wrap{display:grid;grid-template-columns:40px minmax(0,1fr) 40px;align-items:center;gap:12px;width:100%}
.spotlight-nav{width:40px;height:40px;border-radius:50%;border:1px solid #D7DDE5;background:#fff;color:var(--primary);font-size:1.15rem;line-height:1;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:background-color var(--t),border-color var(--t),color var(--t),box-shadow var(--t);flex:0 0 auto;z-index:2;box-shadow:var(--shadow)}
.spotlight-nav:hover{background:#fff;border-color:#C9CFD8;color:var(--primary-dark);transform:none;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.spotlight-track{display:flex;gap:20px;overflow-x:auto;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory;scroll-behavior:smooth;scroll-padding:0;padding:0;flex:1;scrollbar-width:none;mask-image:none}
.spotlight-track::-webkit-scrollbar{display:none}
.spotlight-item{flex:0 0 calc((100% - 40px) / 3 - 1px);scroll-snap-align:start;opacity:1;transform:none;transition:transform var(--t),opacity var(--t),filter var(--t);filter:none;min-width:0}
.spotlight-item .card{height:100%;min-height:320px;border-radius:8px;overflow:hidden;display:flex;flex-direction:column;background:#fff;border:1px solid #e0e0e0;box-shadow:var(--shadow)}
.spotlight-item .card img,.spotlight-item .card iframe{width:100%;aspect-ratio:16/9;display:block;object-fit:cover;background:#fff}
.spotlight-item .card .card-body{flex:1;overflow:hidden;min-height:0;padding:24px}
.spotlight-item.is-active{opacity:1;transform:none}
.spotlight-item.is-active .card{box-shadow:var(--shadow-hover)}
.spotlight-light .spotlight-nav{border-color:var(--border);background:#fff;color:var(--primary)}
.spotlight-light .spotlight-nav:hover{background:#fff}
.spotlight-light .spotlight-track{mask-image:none}

.site-header{background:linear-gradient(90deg,#8F0A22 0%,#B80F2E 58%,#D61A3C 100%);border-bottom:0;position:sticky;top:0;z-index:999;padding:14px 24px;display:flex;align-items:center;color:#fff;box-shadow:0 8px 22px rgba(125,12,31,.28)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;gap:24px;max-width:1400px;margin:0 auto;flex:1;width:100%}
.nav-brand{color:#fff;font-family:var(--font-h);font-size:clamp(1.3rem,1.7vw,1.65rem);font-weight:700;cursor:pointer;display:flex;align-items:center;gap:10px;user-select:none;letter-spacing:.02em;position:relative;z-index:2;text-decoration:none;min-width:0;padding:0}
.nav-brand img{height:42px;width:auto;border-radius:0;object-fit:contain;box-shadow:none}
.nav-collapse{display:flex;align-items:center;justify-content:space-between;gap:24px;flex:1;min-width:0}
.nav-links{display:flex;gap:24px;list-style:none;background:transparent;padding:0;border-radius:0;position:relative;align-items:center;flex:1;overflow-x:auto;border:none;scroll-behavior:smooth;scrollbar-width:none}
.nav-links::-webkit-scrollbar{display:none}
.nav-links a{color:rgba(255,255,255,.86);padding:0 6px;border-radius:0;font-size:.92rem;font-weight:700;letter-spacing:.08em;transition:color var(--t),border-color var(--t);cursor:pointer;border:none;border-bottom:2px solid transparent;position:relative;display:flex;align-items:center;justify-content:center;gap:0;white-space:nowrap;line-height:1;min-height:44px;background:transparent;text-transform:uppercase}
.nav-links a svg{display:none}
.nav-links a:hover{color:#fff;background:transparent;transform:none;border-bottom-color:#fff}
.nav-links a.active{color:#fff;font-weight:800;background:transparent;border-bottom-color:#fff}
.nav-links a::after{display:none}
.nav-user{color:#fff;display:flex;align-items:center;gap:12px;position:relative;z-index:2;flex-shrink:0}
.nav-account{display:flex;align-items:center;gap:10px;padding:0;border-radius:0;background:transparent;border:none;min-width:0;max-width:380px;cursor:pointer;transition:color var(--t);min-height:44px;box-shadow:none}
.nav-account:hover{background:transparent;transform:none}
.nav-avatar{width:36px;height:36px;border-radius:50%;background:var(--primary-soft);color:var(--primary);display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:.95rem;flex-shrink:0;font-family:var(--font)}
.nav-account-meta{display:flex;flex-direction:column;min-width:0;line-height:1;transition:color var(--t)}
.nav-account-name{color:#fff;font-size:.88rem;font-weight:700;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-account-role{color:rgba(255,255,255,.76);font-size:.875rem;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;font-weight:700}
.nav-account-email{color:var(--muted);font-size:.875rem;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:none}
.nav-account-logout{height:44px;min-width:44px;padding:0 14px;border-radius:8px;border:1px solid var(--primary);background:#fff;color:var(--primary);font:inherit;font-size:.88rem;font-weight:600;display:inline-flex;align-items:center;gap:6px;cursor:pointer;transition:background-color var(--t),color var(--t),border-color var(--t),opacity var(--t);flex-shrink:0;margin-left:8px;box-shadow:none}
.nav-account-logout:hover{background:#fff5f5;color:var(--primary-dark);border-color:var(--primary-dark);transform:none;box-shadow:none}
.role-pill{background:#fff;color:var(--primary);padding:6px 12px;border-radius:6px;font-size:.875rem;font-weight:800;letter-spacing:.02em;line-height:1}
.hamburger{display:none;width:44px;height:44px;background:var(--primary);border:1px solid var(--primary);border-radius:8px;cursor:pointer;flex-direction:column;justify-content:center;align-items:center;gap:5px;padding:0;position:relative;z-index:1001;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;box-shadow:none;min-width:44px;min-height:44px;transition:background-color var(--t),border-color var(--t),opacity var(--t)}
.hamburger span{display:block;width:20px;height:2px;background:#fff;border-radius:2px;transition:transform var(--t),opacity var(--t),background-color var(--t)}
.hamburger:hover,.hamburger:active{background:var(--primary-dark);border-color:var(--primary-dark);transform:none;box-shadow:none}
.hamburger:active span{background:rgba(255,255,255,.9)}

.hero{background:linear-gradient(115deg,#7D081D 0%,#B80F2E 46%,#D61A3C 76%,#F7AFBD 100%);color:#fff;padding:92px 24px;text-align:left;position:relative;overflow:hidden;margin-top:0;display:flex;flex-direction:column;justify-content:center;align-items:stretch;min-height:auto;gap:0}
.hero::before{content:"";position:absolute;inset:auto -8% -42% auto;width:460px;height:460px;background:radial-gradient(circle,rgba(255,255,255,.34),rgba(255,255,255,0) 70%);pointer-events:none}
.hero::after{content:"";position:absolute;inset:-38% auto auto -10%;width:540px;height:540px;background:radial-gradient(circle,rgba(255,255,255,.18),rgba(255,255,255,0) 70%);pointer-events:none}
.hero-content{position:relative;z-index:2;max-width:1200px;width:100%;margin:0 auto;display:flex;flex-direction:column;align-items:flex-start}
.hero h1{color:#fff;margin:0 0 14px;font-size:clamp(3rem,4.5vw,3.8rem);font-family:var(--font-h);font-weight:700;letter-spacing:.015em;line-height:1.08;max-width:760px}
.hero-tagline{color:rgba(255,255,255,.84);font-size:clamp(1.125rem,1.4vw,1.25rem);margin:0 0 12px;font-weight:500;letter-spacing:0;text-transform:none;font-family:var(--font);font-style:normal;max-width:700px}
.hero p{color:rgba(255,255,255,.92);font-size:1rem;max-width:700px;margin:0;font-weight:400;letter-spacing:0;line-height:1.6;text-shadow:none}
.hero-cta{display:flex;flex-direction:column;justify-content:flex-start;gap:24px;margin-top:24px;z-index:2;position:relative;align-items:flex-start;width:100%;max-width:700px}
.hero-img{display:none}

.hero .badge{display:none !important}
.hero .search-bar{max-width:700px;width:100%;border-radius:8px;box-shadow:none;background:#fff}
.hero .search-bar:focus-within{border-color:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.14)}
.hero .search-bar input{height:48px}
.hero .search-bar button{height:48px;background:var(--primary);color:#fff;border-left:0;padding:0 28px;font-weight:600}
.hero .search-bar button:hover{background:var(--primary-dark);transform:none;box-shadow:none}
.hero .btn{box-shadow:none}
.hero .btn:hover{transform:none;box-shadow:none}
.hero-kicker{display:inline-flex;align-items:center;padding:8px 14px;border:1px solid rgba(255,255,255,.35);background:rgba(255,255,255,.14);color:#fff;font-size:.78rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border-radius:999px;margin-bottom:18px}
.hero-chips{display:flex;gap:10px;flex-wrap:wrap;margin-top:28px}
.hero-chip{display:inline-flex;align-items:center;justify-content:center;padding:8px 13px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.12);color:#fff;border-radius:999px;font-size:.78rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.home-search{max-width:100%;min-width:320px}

.home-section{position:relative}
.home-section-alt{background:linear-gradient(180deg,#fff5f7 0%,#fff 100%)}
.home-section-light{background:linear-gradient(180deg,#fff 0%,#f8fafc 100%)}
.home-section-dark{background:linear-gradient(130deg,#7D081D 0%,#B80F2E 48%,#D61A3C 100%);color:#fff}
.home-section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;flex-wrap:wrap;gap:16px}
.home-section-title{margin:0}
.home-section-sub{margin:6px 0 0;font-size:.96rem}
.home-section-dark .home-section-title,.home-section-dark .home-section-sub{color:#fff}
.home-section-dark .home-section-sub{color:rgba(255,255,255,.82)}
.home-dark-btn{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.28);color:#fff}
.home-dark-btn:hover{background:rgba(255,255,255,.24);border-color:rgba(255,255,255,.4);color:#fff}

.home-quick-wrap{padding:60px 24px;background:linear-gradient(180deg,#fff5f7 0%,#fff 100%);border-top:1px solid #f0d8de;text-align:center}
.home-quick-title{margin-bottom:12px;font-size:clamp(1.3rem,3vw,2rem)}
.home-quick-sub{color:var(--muted);max-width:680px;margin:0 auto 36px;font-size:1.05rem}
.home-quick-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;max-width:900px;margin:0 auto}
.quick-tile{background:#fff;border:1px solid #eadbe0;padding:26px 20px;border-radius:var(--radius);box-shadow:var(--shadow);transition:transform var(--t),box-shadow var(--t),border-color var(--t)}
.quick-tile:hover{transform:translateY(-4px);box-shadow:var(--shadow-hover);border-color:#C72D49}
.quick-tile-label{color:var(--text);font-size:.95rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em}

.search-bar{display:flex;align-items:stretch;gap:0;max-width:760px;width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;background:#fff;box-shadow:var(--shadow);transition:border-color var(--t),box-shadow var(--t)}
.search-bar:focus-within{border-color:var(--primary);box-shadow:0 0 0 2px rgba(196,30,58,.14)}
.search-bar .ac-wrap{position:relative;flex:1 1 auto;min-width:0}
.search-bar input{width:100%;height:48px;padding:0 16px;border:0;border-radius:0;font:inherit;font-size:1rem;background:#fff;color:var(--text);transition:none;min-width:0;outline:none}
.search-bar input:focus{outline:none;border:0;box-shadow:none}
.search-bar input::placeholder{color:var(--muted)}
.search-bar button{flex:0 0 auto;height:48px;border-radius:0;border-left:1px solid rgba(255,255,255,.1);margin:0;box-shadow:none}
.search-bar .btn{min-height:48px}

.ac-drop{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius-sm) var(--radius-sm);box-shadow:var(--shadow-hover);z-index:200;max-height:300px;overflow-y:auto;display:none}
.ac-drop.open{display:block}
.ac-item{padding:12px 14px;cursor:pointer;font-size:.9rem;display:flex;align-items:center;gap:10px;transition:background-color var(--t),color var(--t);border-bottom:1px solid #EDF0F4}
.ac-item:hover{background:#F8FAFC}
.ac-item:last-child{border-bottom:none}
.ac-type{font-size:.75rem;background:var(--primary);color:#fff;padding:4px 8px;border-radius:4px;flex-shrink:0;font-weight:800;text-transform:uppercase}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 28px;border-radius:8px;border:1px solid var(--primary);cursor:pointer;font:inherit;font-size:1rem;font-weight:700;text-decoration:none;transition:background-color var(--t),color var(--t),border-color var(--t),opacity var(--t);white-space:nowrap;letter-spacing:.02em;position:relative;overflow:hidden;min-height:48px;box-shadow:none;background:var(--primary);color:#fff;line-height:1.2;text-transform:uppercase}
.btn:hover{transform:none;box-shadow:none;background:var(--primary-dark);border-color:var(--primary-dark)}
.btn:active{transform:none;background:#ac1732;border-color:#ac1732}
.btn:focus,.btn:focus-visible,.btn:active:focus{outline:2px solid var(--primary);outline-offset:2px;box-shadow:none}
.btn-primary,.btn-accent,.btn-danger{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover,.btn-accent:hover,.btn-danger:hover{background:var(--primary-dark);border-color:var(--primary-dark);color:#fff}
.btn-secondary,.btn-outline,.btn-light{background:#fff;color:var(--primary);border-color:var(--primary)}
.btn-secondary:hover,.btn-outline:hover,.btn-light:hover{background:#fff5f5;color:var(--primary-dark);border-color:var(--primary-dark)}
.btn-ghost{background:transparent;color:var(--primary);border-color:var(--primary);box-shadow:none}
.btn-ghost:hover{background:#fff5f5;color:var(--primary-dark);border-color:var(--primary-dark)}
.btn-sm{padding:10px 20px;font-size:.9rem;min-height:44px}
.btn-lg{padding:12px 32px;font-size:1rem;min-height:48px}
.btn[disabled],.btn.is-disabled,.btn:disabled{opacity:.55;cursor:not-allowed;pointer-events:none}

.btn-link,.text-button,.link-button{display:inline-flex;align-items:center;gap:6px;padding:0;background:transparent;border:none;color:var(--primary);font:inherit;font-weight:600;cursor:pointer;text-decoration:none;transition:color var(--t),opacity var(--t),text-decoration-color var(--t);box-shadow:none;min-height:auto}
.btn-link:hover,.text-button:hover,.link-button:hover{background:transparent;color:var(--primary-dark);box-shadow:none;transform:none;text-decoration:underline}
.btn-link:focus,.text-button:focus,.link-button:focus,.btn-link:focus-visible,.text-button:focus-visible,.link-button:focus-visible{outline:2px solid var(--primary);outline-offset:2px;box-shadow:none;border-radius:4px}
.btn-link[disabled],.text-button[disabled],.link-button[disabled]{opacity:.55;cursor:not-allowed;pointer-events:none}

.badge{display:inline-block;padding:6px 12px;border-radius:6px;font-size:.875rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;background:rgba(196,30,58,.1);color:var(--primary)}
.badge-primary{background:rgba(196,30,58,.1);color:var(--primary)}
.badge-success{background:rgba(19,121,91,.12);color:var(--success)}
.badge-danger{background:rgba(180,35,24,.12);color:var(--danger)}

.tag-pill{display:inline-flex;align-items:center;justify-content:center;padding:0 14px;min-height:40px;border-radius:8px;border:1px solid var(--primary);font-size:.875rem;cursor:pointer;color:var(--primary);transition:background-color var(--t),color var(--t),border-color var(--t),opacity var(--t);background:#fff;font-weight:600;box-shadow:none}
.tag-pill:hover,.tag-pill.active{background:#fff5f5;color:var(--primary-dark);border-color:var(--primary-dark);transform:none;box-shadow:none}
.tag-pill:focus,.tag-pill:focus-visible{outline:2px solid var(--primary);outline-offset:2px;box-shadow:none}
.tag-pill[disabled],.tag-pill.is-disabled{opacity:.55;cursor:not-allowed;pointer-events:none}

.pagination{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:40px}
.page-btn{padding:0 16px;min-height:44px;border:1px solid var(--primary);border-radius:8px;background:#fff;cursor:pointer;color:var(--primary);font-size:.875rem;transition:background-color var(--t),color var(--t),border-color var(--t),opacity var(--t);font-weight:600;box-shadow:none}
.page-btn:hover{background:#fff5f5;border-color:var(--primary-dark);color:var(--primary-dark);transform:none;box-shadow:none}
.page-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.page-btn:focus,.page-btn:focus-visible{outline:2px solid var(--primary);outline-offset:2px;box-shadow:none}
.page-btn[disabled],.page-btn.is-disabled{opacity:.55;cursor:not-allowed;pointer-events:none}

.form-group{margin-bottom:16px}
.form-label{display:block;font-weight:700;margin-bottom:8px;font-size:.875rem;color:var(--primary);letter-spacing:0}
.form-label .req{color:var(--danger);margin-left:3px}
.form-control{width:100%;padding:12px 16px;border:1px solid #e0e0e0;border-radius:6px;font:inherit;font-size:.95rem;background:#fff;color:var(--text);transition:border-color var(--t),box-shadow var(--t),background-color var(--t);min-height:40px}
.form-control:focus{outline:2px solid var(--primary);outline-offset:0;border-color:var(--primary);box-shadow:none;background:#fff}
.form-control::placeholder{color:var(--muted)}
textarea.form-control{min-height:140px;padding-top:12px;padding-bottom:12px;resize:vertical;font-family:inherit}
.form-hint{font-size:.85rem;color:var(--muted);margin-top:6px;font-weight:500}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px}

.toolbar{display:flex;flex-wrap:wrap;gap:8px;padding:8px;background:#fff;border:1px solid var(--border);border-bottom:none;border-radius:var(--radius-sm) var(--radius-sm) 0 0}
.toolbar button{padding:0 12px;min-height:40px;border:1px solid var(--primary);border-radius:8px;background:#fff;color:var(--primary);cursor:pointer;font-size:.85rem;transition:background-color var(--t),color var(--t),border-color var(--t),opacity var(--t);font-weight:600;box-shadow:none}
.toolbar button:hover{background:#fff5f5;color:var(--primary-dark);border-color:var(--primary-dark);transform:none}
.toolbar button:focus,.toolbar button:focus-visible{outline:2px solid var(--primary);outline-offset:2px;box-shadow:none}
.toolbar button[disabled]{opacity:.55;cursor:not-allowed;pointer-events:none}
.editor{width:100%;min-height:200px;border:1px solid var(--border);border-radius:0 0 var(--radius-sm) var(--radius-sm);padding:14px;font:inherit;font-size:.95rem;line-height:1.7;background:#fff;color:var(--text)}
.editor:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(196,30,58,.12)}

.video-wrap{position:relative;padding-top:56.25%;border-radius:var(--radius);overflow:hidden;background:#000}
.video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.pdf-box{display:flex;align-items:center;gap:16px;padding:16px;background:#fff;border:1px solid var(--border);border-radius:var(--radius-sm)}
.pdf-icon{font-size:2.4rem}
.rich-content{line-height:1.85;color:var(--text)}

.rich-content ul,.rich-content ol{padding-left:24px;margin-bottom:16px}
.rich-content blockquote{border-left:4px solid var(--primary);padding:12px 16px;background:#F8FAFC;border-radius:0 var(--radius-sm) var(--radius-sm) 0;margin:16px 0;color:var(--muted);font-style:italic}

.tabs,.tab-nav,.tab-list{display:flex;flex-wrap:wrap;gap:8px;border-bottom:1px solid var(--border)}
.tab,.tab-button,.tab-nav a,.tabs button,[role="tab"]{padding:10px 16px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--muted);font-weight:600;cursor:pointer;transition:background-color var(--t),color var(--t),border-color var(--t),opacity var(--t);text-decoration:none}
.tab:hover,.tab-button:hover,.tab-nav a:hover,.tabs button:hover,[role="tab"]:hover{color:var(--primary-dark);background:#fff5f5;transform:none}
.tab.active,.tab-button.active,.tab-nav a.active,.tabs button.active,[role="tab"][aria-selected="true"]{color:var(--primary);border-bottom-color:var(--primary);background:#fff5f5}
.tab:focus,.tab-button:focus,.tab-nav a:focus,.tabs button:focus,[role="tab"]:focus,.tab:focus-visible,.tab-button:focus-visible,.tab-nav a:focus-visible,.tabs button:focus-visible,[role="tab"]:focus-visible{outline:2px solid var(--primary);outline-offset:2px;box-shadow:none}

a:not(.btn):not(.page-btn):not(.tag-pill):not(.tab):not(.tab-button):not([role="tab"]){transition:color var(--t),opacity var(--t),text-decoration-color var(--t)}
a:not(.btn):not(.page-btn):not(.tag-pill):not(.tab):not(.tab-button):not([role="tab"]):hover{color:var(--primary-dark)}
a:not(.btn):not(.page-btn):not(.tag-pill):not(.tab):not(.tab-button):not([role="tab"]):focus-visible{outline:none;box-shadow:0 0 0 3px rgba(196,30,58,.18);border-radius:4px}

.modal,.modal-content,.dialog,.dialog-content{background:#fff;color:var(--text);border-left:4px solid var(--primary)}
.modal-header,.dialog-header{border-bottom:1px solid var(--border);padding-bottom:12px}
.modal-title,.dialog-title{color:var(--text)}

.page-header,.staff-hero{background:linear-gradient(100deg,#8F0A22 0%,#B80F2E 56%,#D61A3C 100%);color:#fff;padding:70px 24px;position:relative;overflow:hidden;border-bottom:1px solid rgba(255,255,255,.12)}
.page-header::before,.staff-hero::before{content:"";position:absolute;right:-80px;top:-90px;width:360px;height:360px;background:radial-gradient(circle,rgba(255,255,255,.28),rgba(255,255,255,0) 70%)}
.page-header::after,.staff-hero::after{content:"";position:absolute;left:-120px;bottom:-140px;width:420px;height:420px;background:radial-gradient(circle,rgba(255,255,255,.2),rgba(255,255,255,0) 70%)}
.page-header-content,.staff-hero-content{position:relative;z-index:2;max-width:1200px;margin:0 auto}
.page-header h1,.staff-hero h1{color:#fff;margin-bottom:12px;font-weight:800;font-size:clamp(1.8rem,4vw,3rem)}
.page-header p,.staff-hero p{color:rgba(255,255,255,.9);margin:0;max-width:700px;font-size:1.05rem}

.staff-shell{max-width:1400px;margin:0 auto;padding:0 24px}
.staff-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-top:32px;position:relative;z-index:2}
.kpi-card,.library-card,.stat-card,.card,.panel,.loader-box,.staff-users{background:#fff;border:1px solid #E6E8ED;border-radius:10px;box-shadow:var(--shadow);transition:box-shadow var(--t),border-color var(--t),background-color var(--t)}
.kpi-card:hover,.library-card:hover,.stat-card:hover,.card:hover,.panel:hover,.loader-box:hover,.staff-users:hover{box-shadow:var(--shadow-hover);border-color:#C72D49}
.kpi-card{padding:24px}
.kpi-value{font-size:2.2rem;font-weight:800;color:var(--primary);line-height:1}
.kpi-label{font-size:.875rem;color:var(--muted);margin-top:8px;text-transform:uppercase;letter-spacing:.05em;font-weight:700}
.kpi-meta{font-size:.875rem;color:var(--muted);margin-top:8px;font-weight:500}
.library-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:24px;max-width:none;margin:0 0 28px}
.library-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;padding:24px;background:#fff;border-bottom:1px solid #e0e0e0}
.library-title{margin:0;font-size:1.05rem;font-weight:700;color:#1a1a1a}
.library-sub{margin-top:4px;color:var(--muted);font-size:.9rem;font-weight:400}
.library-list{padding:24px;max-height:460px;overflow-y:auto;min-height:300px}
.library-item{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;padding:16px 0;border-bottom:1px solid #eee}
.library-item:last-child{border-bottom:none}
.library-item-title{font-weight:700;color:var(--text);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:.95rem}
.library-item-meta{font-size:.875rem;color:var(--muted);font-weight:500}
.library-actions{display:flex;gap:8px;flex-shrink:0;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.status-chip{padding:6px 10px;border-radius:6px;font-size:.875rem;font-weight:800;color:#fff;white-space:nowrap;text-transform:uppercase;letter-spacing:.03em}
.status-chip.is-published{background:var(--success)}
.status-chip.is-draft{background:var(--muted)}
.empty-inline{padding:24px;text-align:center;color:var(--muted);font-size:.95rem;font-weight:500}
.staff-users-head{padding:18px 20px;background:#F8FAFC;border-bottom:1px solid var(--border)}
.staff-users-head h3{margin:0;font-size:1.05rem;font-weight:700}
.staff-users-body{padding:16px 20px}
.staff-users-note{color:var(--muted);font-size:.9rem;line-height:1.6;max-width:900px;font-weight:500}

.stat-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:24px;max-width:1200px;margin:0 auto 40px}
.stat-card{padding:24px;text-align:center}
.stat-num{font-size:2.5rem;font-weight:800;color:var(--primary);line-height:1}
.stat-label{color:var(--muted);font-size:.875rem;margin-top:8px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.data-table{width:100%;border-collapse:collapse;font-size:.95rem;background:#fff}
.data-table th{background:#F8FAFC;text-align:left;padding:12px 16px;font-weight:700;color:var(--text);border-bottom:1px solid var(--border);font-size:.875rem;text-transform:uppercase;letter-spacing:.05em}
.data-table td{padding:12px 16px;border-bottom:1px solid #EDF0F4;vertical-align:middle;color:var(--text)}
.data-table tr:hover td{background:#FBFCFD}
.actions{display:flex;gap:6px;flex-wrap:wrap}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--radius);border:1px solid var(--border)}

.alert{padding:16px;border-radius:var(--radius-sm);margin-bottom:16px;font-size:.95rem;display:flex;align-items:flex-start;gap:16px;border-left:4px solid}
.alert-danger{background:rgba(180,35,24,.08);border-left-color:var(--danger);color:var(--text)}
.alert-info{background:rgba(196,30,58,.06);border-left-color:var(--primary);color:var(--text)}
.alert-success{background:rgba(19,121,91,.08);border-left-color:var(--success);color:var(--text)}

#toast-box{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px}
.toast{padding:16px;border-radius:var(--radius-sm);color:#fff;font-size:.9rem;box-shadow:var(--shadow-hover);max-width:360px;font-weight:600;border-left:4px solid}
.toast-ok{background:var(--success);border-left-color:#69C4A6}.toast-err{background:var(--danger);border-left-color:#F38B82}

.spinner{width:40px;height:40px;border:4px solid rgba(226,232,240,.85);border-top-color:var(--primary);border-radius:50%;animation:spin .9s linear infinite;margin:32px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:9998;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.loader-overlay.show{display:flex}
.loader-box{padding:32px 40px;text-align:center}
.loader-box .spinner{margin:0 auto 16px}

.panel{max-width:500px;margin:64px auto;padding:48px;text-align:center}
.panel-icon{font-size:3.6rem;margin-bottom:16px}

.empty{text-align:center;padding:64px 24px;color:var(--muted)}
.empty-icon{font-size:3.6rem;margin-bottom:16px;opacity:.5}

.card{overflow:hidden;display:flex;flex-direction:column;cursor:pointer}
.card:hover{transform:none}
.card-thumb{width:100%;height:auto;aspect-ratio:16/9;object-fit:cover;background:#fff;display:block}
.card-thumb-placeholder{width:100%;height:auto;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;font-size:2rem;background:#fff;color:#666}
.card-body{padding:24px;flex:1;display:flex;flex-direction:column;gap:12px}
.card-title{font-size:clamp(1.125rem,1.4vw,1.25rem);margin-bottom:0;color:#1a1a1a;font-weight:700;line-height:1.35}
.card-desc{color:#666;font-size:clamp(.875rem,1.1vw,.95rem);flex:1;margin-bottom:0;line-height:1.6}
.card-footer{margin-top:auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;padding-top:12px;border-top:1px solid #e0e0e0}

.card .badge,.card .tag-pill{font-size:.875rem}
.card .badge{background:#f5f5f5;color:#555}
.card .badge-primary{background:#f5f5f5;color:#555}
.card .badge-success{background:#f5f5f5;color:#555}
.card .badge-danger{background:#f5f5f5;color:#555}

.featured-img{width:100%;max-height:400px;object-fit:cover;border-radius:var(--radius);margin-bottom:32px;border:1px solid var(--border)}
.post-meta{display:flex;flex-wrap:wrap;gap:16px;color:var(--muted);font-size:.9rem;margin:12px 0 24px;font-weight:500}
.filter-bar{display:flex;flex-wrap:wrap;gap:16px;align-items:center;margin-bottom:24px}


.site-footer{background:var(--primary);color:#fff;padding:48px 24px 24px;font-size:.9rem;margin-top:auto;position:relative}

.site-footer p:first-child{grid-column:1}
.site-footer p:first-child::before{content:'Silver Oaks Career Council';font-size:16px;font-weight:700}

.site-footer p:nth-child(2){grid-column:2}
.site-footer p:nth-child(2)::before{content:'Resources';font-size:16px;font-weight:700}

.site-footer p:nth-child(3){grid-column:3}
.site-footer p:nth-child(3)::before{content:'Contact';font-size:16px;font-weight:700}

.site-footer p:first-child::after{content:'Career learning, research, and resources';display:block;font-size:14px;color:rgba(255,255,255,.9);font-weight:400;line-height:1.6;margin-top:0}
.site-footer p:nth-child(2)::after{content:'Courses\A Career labs\A Study guides\A Videos';white-space:pre-line;display:block;font-size:14px;color:rgba(255,255,255,.9);font-weight:400;line-height:1.6}
.site-footer p:nth-child(3)::after{content:'Email: info@silveroaksschool.edu\A Phone: (000) 000-0000';white-space:pre-line;display:block;font-size:14px;color:rgba(255,255,255,.9);font-weight:400;line-height:1.6}
.site-footer strong{color:#fff;font-weight:700}
.site-footer-motto{font-style:normal;font-size:14px;color:#fff;margin-top:0;font-family:var(--font)}
.site-footer::after{content:'© 2026 Silver Oaks School. All rights reserved.';display:block;max-width:1200px;margin:24px auto 0;padding-top:24px;border-top:1px solid rgba(255,255,255,.28);text-align:center;font-size:14px;line-height:1.6;color:#fff}

.btn:focus-visible,.btn-link:focus-visible,.text-button:focus-visible,.link-button:focus-visible,.tag-pill:focus-visible,.page-btn:focus-visible,.toolbar button:focus-visible,.tab:focus-visible,.tab-button:focus-visible,.tab-nav a:focus-visible,.tabs button:focus-visible,[role="tab"]:focus-visible,.nav-account-logout:focus-visible,.hamburger:focus-visible,.nav-close:focus-visible{outline:2px solid var(--primary);outline-offset:2px}

function _youtubeEmbed(url) {
  if (!url) return "";
  var videoId = "";
  var m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/);
  if (m) videoId = m[1];
  if (!videoId) return "";
  return videoId;
}

function _youtubeThumb(videoId) {
  if (!videoId) return "";
  return "https://img.youtube.com/vi/" + videoId + "/hqdefault.jpg";
}

function _pdfDownload(url) {
  if (!url) return "";
  var m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return "https://drive.google.com/uc?export=download&id=" + m[1];
  m = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (m) return "https://drive.google.com/uc?export=download&id=" + m[1];
  return url;
}

function _withErrorContext(err, context) {
  var msg = err && err.message ? err.message : String(err || "Unknown error");
  return new Error(context ? (context + ": " + msg) : msg);
}

function _extractBucketPathFromUrl(url) {
  var raw = String(url || "").trim();
  if (!raw) return null;
  if (raw.indexOf("http") !== 0) return null;
  var marker = "/storage/v1/object/public/" + SUPABASE_STORAGE_BUCKET + "/";
  var idx = raw.indexOf(marker);
  if (idx === -1) return null;
  var part = raw.slice(idx + marker.length).split("?")[0].split("#")[0];
  try {
    part = decodeURIComponent(part);
  } catch (e) {}
  return part || null;
}

function _collectStoragePathsFromText(text) {
  var html = String(text || "");
  if (!html) return [];
  var rgx = /https?:\/\/[^"'\s<>]+/g;
  var found = html.match(rgx) || [];
  var paths = [];
  found.forEach(function(url) {
    var p = _extractBucketPathFromUrl(url);
    if (p) paths.push(p);
  });
  return paths;
}

function _unique(values) {
  var out = [];
  var seen = {};
  (values || []).forEach(function(v) {
    var key = String(v || "");
    if (!key || seen[key]) return;
    seen[key] = true;
    out.push(key);
  });
  return out;
}

function _collectAttachmentPaths(row, table) {
  if (!row) return [];
  var paths = [];
  [
    row.thumbnail_url,
    row.featured_image_url,
    row.pdf_link,
    row.youtube_url
  ].forEach(function(value) {
    var p = _extractBucketPathFromUrl(value);
    if (p) paths.push(p);
  });
  if (table === "courses" || table === "blogs" || table === "reference_materials" || table === "career_labs") {
    paths = paths.concat(_collectStoragePathsFromText(row.content));
  }
  return _unique(paths);
}

async function _deleteStoragePaths(db, paths) {
  var all = _unique(paths);
  if (!all.length) return;
  var bucket = db.storage.from(SUPABASE_STORAGE_BUCKET);
  var chunkSize = 100;
  for (var i = 0; i < all.length; i += chunkSize) {
    var chunk = all.slice(i, i + chunkSize);
    var result = await bucket.remove(chunk);
    if (result.error) throw _withErrorContext(result.error, "Failed to delete storage attachments");
  }
}

}

function _matchesText(value, q) {
  return String(value || "").toLowerCase().indexOf(String(q || "").toLowerCase()) !== -1;
}

function _filterCourses(rows, opts) {
  var search = String(opts.search || "").toLowerCase();
  var category = String(opts.category || "").toLowerCase();
  var grade = String(opts.grade || "").toLowerCase();
  return rows.filter(function (r) {
    if (search && !(_matchesText(r.Title, search) || _matchesText(r.Description, search) || _matchesText(r.Instructor, search) || _matchesText(r.Category, search) || _matchesText(r.Grade, search))) return false;
    if (category && String(r.Category || "").toLowerCase() !== category) return false;
    if (grade && String(r.Grade || "").toLowerCase() !== grade) return false;
    return true;
  });
}

function _filterPosts(rows, opts) {
  var search = String(opts.search || "").toLowerCase();
  var tag = String(opts.tag || "").toLowerCase();
  return rows.filter(function (r) {
    if (search && !(_matchesText(r.Title, search) || _matchesText(r.Content, search) || _matchesText(r.Tags, search))) return false;
    if (tag && !String(r.Tags || "").toLowerCase().split(",").some(function(t){ return t.trim() === tag; })) return false;
    return true;
  });
}

function _filterReferences(rows, opts) {
  var search = String(opts.search || "").toLowerCase();
  var category = String(opts.category || "").toLowerCase();
  return rows.filter(function (r) {
    if (search && !(_matchesText(r.Title, search) || _matchesText(r.Description, search) || _matchesText(r.Author, search) || _matchesText(r.Category, search))) return false;
    if (category && String(r.Category || "").toLowerCase() !== category) return false;
    return true;
  });
}

function _filterCareerLabs(rows, opts) {
  var search = String(opts.search || "").toLowerCase();
  var category = String(opts.category || "").toLowerCase();
  var student = String(opts.student || "").toLowerCase();

    if (category && String(r.Category || "").toLowerCase() !== category) return false;
    if (student && String(r.Student || "").toLowerCase().indexOf(student) === -1) return false;
    return true;
  });
}

function verifyAndStart(token) {
  showLoader();
  (async function() {
    try {
      var cfg = _checkSupabaseConfig();
      if (!cfg.ok) throw new Error(cfg.message);
      var info = _decodeJwt(token);
      if (!info) throw new Error("Invalid sign-in token. Please sign in again.");
      var email = String(info.email || "").toLowerCase();
      if (!info.email_verified) throw new Error("Google account email is not verified.");
      if (!_isAllowedEmail(email)) throw new Error("Access denied: only @hyd.silveroaks.co.in accounts are allowed.");
      if (CLIENT_ID && CLIENT_ID !== "PUT_YOUR_OAUTH_CLIENT_ID" && info.aud !== CLIENT_ID) {
        throw new Error("Invalid sign-in audience. Please sign in again.");
      }
      var user = await _ensureUser(email, info.name || email.split("@")[0]);
      if (_normalizeStatus(user).toLowerCase() !== "active") {
        await _db().from("users")
          .update({ status: "Active" })
          .eq("email", email);
      }
      APP_USER = {
        email: email,
        name: user.Name || info.name || email.split("@")[0],
        role: user.Role || "Student",
        isAdmin: (user.Role || "Student") === "Admin" || (user.Role || "Student") === "Editor",
      };
      _idToken = token;
      hideLoader();
      showChrome();
      route(_bootPageFromLocation());
      prewarmData();
    } catch (err) {
      hideLoader();
      _idToken = null;
      sessionStorage.removeItem("auth_id_token");
      APP_USER = null;
      renderLogin(err.message);
      if (window.google && google.accounts) {
        google.accounts.id.prompt();
      }
    }
  })();
}

var _cache   = {};
var CACHE_TTL = 45000;
var _pending  = {};
function _cacheGet(k){ var e = _cache[k]; return (e && Date.now() - e.ts < CACHE_TTL) ? e.data : null; }
function _cacheSet(k, d){ _cache[k] = { ts: Date.now(), data: d }; }
function _cacheInvalidate(){ _cache = {}; }

function _bootPageFromLocation() {
  var allowed = {
    "home": "home",
    "courses": "courses",
    "blog": "blog",
    "blogs": "blog",
    "references": "references",
    "career-lab": "career-lab",
    "careerlab": "career-lab",
    "staff": "staff"
  };
  try {
    var params = new URLSearchParams(window.location.search || "");
    var qp = String(params.get("page") || "").toLowerCase().trim();
    if (allowed[qp]) return allowed[qp];
  } catch (e) {}
  var file = String((window.location.pathname || "").split("/").pop() || "").toLowerCase();
  var map = {
    "index.html": "home",
    "courses.html": "courses",
    "blogs.html": "blog",
    "staff.html": "staff",
    "references.html": "references",
    "careerlab.html": "career-lab"
  };
  return map[file] || "home";
}

function _buildQuery(params) {
  return Object.keys(params).map(function(k) {
    return encodeURIComponent(k) + "=" + encodeURIComponent(params[k] !== undefined ? params[k] : "");
  }).join("&");
}

function apiAsync(action, params) {
  var cacheKey = action + "|" + JSON.stringify(params || {});
  var cached = _cacheGet(cacheKey);
  if (cached) return Promise.resolve(cached);
  return _apiAsync(action, params || {}).then(function(data) {
    _cacheSet(cacheKey, data);
    return data;
  });
}

function api(action, params, onOk, onErr) {
  var cacheKey = action + "|" + JSON.stringify(params || {});
  var cached = _cacheGet(cacheKey);
  if (cached) {
    onOk(cached);
    return;
  }
  _npStart();
  _apiAsync(action, params || {})
    .then(function(data) {
      _npDone();
      _cacheSet(cacheKey, data);
      onOk(data);
    })
    .catch(function(e) { _npDone(); (onErr || defaultErr)(e); });
}

function apiPost(action, body, onOk, onErr) {
  showLoader();
  _apiPost(action, body || {})
    .then(function(data) {
      hideLoader();
      _cacheInvalidate();
      onOk(data);
    })
    .catch(function(e) { hideLoader(); (onErr || defaultErr)(e); });
}

async function _loadSearch(db, q, limit) {
  var query = String(q || "").toLowerCase();
  var max = Math.max(1, Number(limit) || 5);
  var courses = await _selectAll("courses", _toCourse);
  var posts = await _selectAll("blogs", _toPost);
  var references = await _selectAll("reference_materials", _toReference);
  var careerLabs = await _selectAll("career_labs", _toCareerLab);
  function match(row, fields) {
    return fields.some(function(field) { return _matchesText(row[field], query); });
  }
  return {
    courses: courses.filter(function(r){ return match(r, ["Title", "Description", "Instructor", "Category", "Grade"]); }).slice(0, max),
    posts: posts.filter(function(r){ return match(r, ["Title", "Content", "Tags"]); }).slice(0, max),
    references: references.filter(function(r){ return match(r, ["Title", "Description", "Author", "Category"]); }).slice(0, max),
    careerLabs: careerLabs.filter(function(r){ return match(r, ["Title", "Student", "Description", "Mentor", "Category"]); }).slice(0, max),
  };
}

async function _loadStats(db) {
  var courses = await _selectAny("courses", _toCourse);
  var blogs = await _selectAny("blogs", _toPost);
  var references = await _selectAny("reference_materials", _toReference);
  var careerLabs = await _selectAny("career_labs", _toCareerLab);
  var users = await _selectAny("users", _toUser);
  var publishedCourses = courses.filter(function(r){ return r.Status === "Published"; });
  var publishedBlogs = blogs.filter(function(r){ return r.Status === "Published"; });
  var publishedReferences = references.filter(function(r){ return r.Status === "Published"; });
  var publishedCareerLabs = careerLabs.filter(function(r){ return r.Status === "Published"; });
  var activeUsers = users.filter(function(r){ return r.Status === "Active"; });
  var recent = [];
  courses.forEach(function(c){ recent.push({ type:"Course", id:c.ID, title:c.Title, status:c.Status, date:c.CreatedDate }); });
  blogs.forEach(function(b){ recent.push({ type:"Blog", id:b.ID, title:b.Title, status:b.Status, date:b.CreatedDate }); });
  references.forEach(function(r){ recent.push({ type:"Reference", id:r.ID, title:r.Title, status:r.Status, date:r.CreatedDate }); });
  careerLabs.forEach(function(l){ recent.push({ type:"Career Lab", id:l.ID, title:l.Title, status:l.Status, date:l.CreatedDate }); });
  recent.sort(function(a, b) { return new Date(b.date) - new Date(a.date); });
  var catMap = {};
  courses.forEach(function(c) { var cat = c.Category || "Uncategorized"; catMap[cat] = (catMap[cat] || 0) + 1; });
  var gradeMap = {};
  courses.forEach(function(c) { var g = c.Grade || "Unassigned"; gradeMap[g] = (gradeMap[g] || 0) + 1; });
  return {
    totalCourses: courses.length,
    totalBlogs: blogs.length,
    totalReferences: references.length,
    totalCareerLabs: careerLabs.length,
    publishedCourses: publishedCourses.length,
    publishedBlogs: publishedBlogs.length,
    publishedReferences: publishedReferences.length,
    publishedCareerLabs: publishedCareerLabs.length,
    activeUsers: activeUsers.length,
    recentActivity: recent.slice(0, 10),
    categoryData: catMap,
    gradeData: gradeMap,
  };
}

async function _deleteById(db, table, id) {
  if (!id) throw new Error("Missing id");
  var current = await db.from(table).select("*").eq("id", id).maybeSingle();
  if (current.error) throw _withErrorContext(current.error, "Failed to load row before deletion");
  if (current.data) {
    var paths = _collectAttachmentPaths(current.data, table);
    await _deleteStoragePaths(db, paths);
  }
  var result = await db.from(table).delete().eq("id", id);
  if (result.error) throw _withErrorContext(result.error, "Failed to delete from " + table);
  return { ok: true };
}

async function _updateUserRole(db, email, role) {
  var result = await db.from("users").update({ role: role, status: "Active" }).eq("email", String(email || "").toLowerCase()).select("*").maybeSingle();
  if (result.error) throw _withErrorContext(result.error, "Failed to update user role");
  return { ok: true };
}

async function _deleteUserCompletely(db, email) {
  var safeEmail = String(email || "").toLowerCase();
  if (!safeEmail) throw new Error("Missing user email");

  // Remove authored blog records first so any related attachments are cleaned up.
  var postsRes = await db.from("blogs").select("id").eq("author_email", safeEmail);
  if (postsRes.error) throw _withErrorContext(postsRes.error, "Failed to load user authored posts");
  var postIds = (postsRes.data || []).map(function(p) { return p.id; });
  for (var i = 0; i < postIds.length; i++) {
    await _deleteById(db, "blogs", postIds[i]);
  }

  var result = await db.from("users").delete().eq("email", safeEmail);
  if (result.error) throw _withErrorContext(result.error, "Failed to delete user");
  return { ok: true };
}

function isEmoji(s) {
  if (!s) return false;
  try {
    return /\p{Extended_Pictographic}/u.test(String(s));
  } catch (e) {
    return /[\u{1F300}-\u{1F6FF}\u{1F900}-\u{1F9FF}]/u.test(String(s));
  }
}

function initAC(inputId, dropId) {
  var inp = document.getElementById(inputId);
  var drop = document.getElementById(dropId);
  if (!inp || !drop) return;
  var timer;
  inp.addEventListener("input", function() {
    clearTimeout(timer);
    var q = inp.value.trim();
    if (q.length < 2) { drop.classList.remove("open"); return; }
    timer = setTimeout(function() {
      api("search", {q: q}, function(res) {
        drop.innerHTML = "";
        var items = [];
        (res.courses    || []).forEach(function(c) { items.push({type:"Course",    label:c.Title,id:c.ID,page:"course"}); });
        (res.posts      || []).forEach(function(p) { items.push({type:"Blog",      label:p.Title,id:p.ID,page:"post"}); });
        (res.references || []).forEach(function(r) { items.push({type:"Reference", label:r.Title,id:r.ID,page:"reference"}); });
        (res.careerLabs || []).forEach(function(l) { items.push({type:"Career Lab", label:l.Title,id:l.ID,page:"career-lab-item"}); });
        if (!items.length) {
          drop.innerHTML = "<div class='ac-item' style='color:#999'>No results</div>";
        } else {
          items.forEach(function(item) {
            var div = document.createElement("div");
            div.className = "ac-item";
            div.innerHTML = "<span class='ac-type'>"+esc(item.type)+"</span><span>"+esc(item.label)+"</span>";
            div.onclick = function() { route(item.page, {id: item.id}); drop.classList.remove("open"); };
            drop.appendChild(div);
          });
        }
        drop.classList.add("open");
      }, function() { drop.classList.remove("open"); });
    }, 280);
  });
  document.addEventListener("click", function(e) {
    if (!inp.contains(e.target) && !drop.contains(e.target)) drop.classList.remove("open");
    var navCollapse = document.getElementById("nav-collapse");
    var hamburger = document.querySelector(".hamburger");
    if (navCollapse && hamburger && navCollapse.classList.contains("open")) {
      if (!navCollapse.contains(e.target) && !hamburger.contains(e.target)) {
        navCollapse.classList.remove("open");
      }
    }
  });
}

var revealObserver = null;
function initRevealMotion(root) {
  var scope = root && root.querySelectorAll ? root : document;
  var nodes = scope.querySelectorAll(".reveal-up");
  if (!nodes.length) return;

  if (!("IntersectionObserver" in window)) {
    nodes.forEach(function(el) { el.classList.add("in"); });
    return;
  }

  if (!revealObserver) {
    revealObserver = new IntersectionObserver(function(entries, obs) {
      entries.forEach(function(entry) {
        if (!entry.isIntersecting) return;
        entry.target.classList.add("in");
        obs.unobserve(entry.target);
      });
    }, { threshold: .14, rootMargin: "0px 0px -48px 0px" });
  }

  nodes.forEach(function(el) {
    if (el.dataset.revealBound === "1") return;
    el.dataset.revealBound = "1";
    revealObserver.observe(el);
  });
}

function _closestSpotlightItem(track) {
  var items = Array.from(track.querySelectorAll(".spotlight-item"));
  if (!items.length) return null;
  var rect = track.getBoundingClientRect();
  var center = rect.left + rect.width / 2;
  var best = items[0];
  var dist = Infinity;
  items.forEach(function(item) {
    var r = item.getBoundingClientRect();
    var c = r.left + r.width / 2;
    var d = Math.abs(c - center);
    if (d < dist) { dist = d; best = item; }
  });
  return best;
}

function _paintSpotlightActive(track) {
  var items = Array.from(track.querySelectorAll(".spotlight-item"));
  if (!items.length) return;
  var active = _closestSpotlightItem(track);
  items.forEach(function(item) { item.classList.toggle("is-active", item === active); });
}

function initSpotlight(trackId) {
  var track = document.getElementById(trackId);
  if (!track) return;
  var kids = Array.from(track.children);
  if (!kids.length || kids[0].classList.contains("empty")) return;
  kids.forEach(function(child) {
    if (child.classList.contains("spotlight-item")) return;
    var wrap = document.createElement("div");
    wrap.className = "spotlight-item";
    child.replaceWith(wrap);
    wrap.appendChild(child);
  });
  _paintSpotlightActive(track);
  track.addEventListener("scroll", function() { _paintSpotlightActive(track); }, { passive: true });
}

function moveSpotlight(trackId, dir) {
  var track = document.getElementById(trackId);
  if (!track) return;
  var amount = Math.max(280, Math.round(track.clientWidth * 0.78));
  track.scrollBy({ left: dir * amount, behavior: "smooth" });
}

function fmt(cmd) {
  document.getElementById("f-content") && document.getElementById("f-content").focus();
  document.getElementById("p-content") && document.getElementById("p-content").focus();
  if      (cmd === "Bold")      document.execCommand("bold");
  else if (cmd === "Italic")    document.execCommand("italic");
  else if (cmd === "Underline") document.execCommand("underline");
  else if (cmd === "H2")        document.execCommand("formatBlock",false,"h2");
  else if (cmd === "H3")        document.execCommand("formatBlock",false,"h3");
  else if (cmd === "UL")        document.execCommand("insertUnorderedList");
  else if (cmd === "OL")        document.execCommand("insertOrderedList");
  else if (cmd === "Quote")     document.execCommand("formatBlock",false,"blockquote");
  else if (cmd === "Link") {
    var url = prompt("URL:");
    if (url) document.execCommand("createLink",false,url);
  }
}

function uploadFileToField(input, targetId, statusId, previewId, label) {
  var file = input.files && input.files[0];
  if (!file) return;
  var status = statusId ? document.getElementById(statusId) : null;
  var preview = previewId ? document.getElementById(previewId) : null;
  var target = document.getElementById(targetId);
  if (status) status.textContent = "Uploading…";
  var bucket = _db().storage.from(SUPABASE_STORAGE_BUCKET);
  var safeName = String(file.name || "file").replace(/[^a-zA-Z0-9._-]+/g, "_");
  var path = (label || "upload").toLowerCase().replace(/[^a-z0-9]+/g, "-") + "/" + Date.now() + "-" + safeName;
  bucket.upload(path, file, { upsert: true, contentType: file.type })
    .then(function(result) {
      if (result.error) throw result.error;
      return bucket.getPublicUrl(path);
    })
    .then(function(result) {
      var url = result.data && result.data.publicUrl;
      if (!url) throw new Error("Could not resolve public URL for uploaded file.");
      if (target) target.value = url;
      if (preview && file.type.indexOf("image/") === 0) {
        preview.src = url;
        preview.style.display = "block";
      }
      if (status) {
        status.textContent = (label || "File") + " uploaded";
        setTimeout(function(){ if (status) status.textContent = ""; }, 2600);
      }
    })
    .catch(function(err) {
      if (status) status.textContent = "Upload failed: " + (err.message || "unknown error");
    });
}

function renderPagination(key, total, offset, onPage) {
  var el = document.getElementById(key);
  if (!el || total <= PAGE_SIZE) { if (el) el.innerHTML = ""; return; }
  var pages = Math.ceil(total / PAGE_SIZE);
  var cur   = Math.floor(offset / PAGE_SIZE);
  var html  = "";
  if (cur > 0)       html += '<button class="page-btn" onclick="_pg(\''+key+'\','+(cur-1)+')">← Prev</button>';
  for (var i = 0; i < pages; i++) {
    html += '<button class="page-btn'+(i===cur?" active":"")+'" onclick="_pg(\''+key+'\','+i+')">'+(i+1)+'</button>';
  }
  if (cur < pages-1) html += '<button class="page-btn" onclick="_pg(\''+key+'\','+(cur+1)+')">Next →</button>';
  el.innerHTML = html;
  window["_pgcb_"+key] = onPage;
}
function _pg(key, idx) {
  var cb = window["_pgcb_"+key];
  if (cb) cb(idx * PAGE_SIZE);
}

function postCard(p) {
  var canOpen = !!p.ID;
  var excerpt = stripHtml(p.Content||"").slice(0,115);
  var thumbVal = p.FeaturedImageURL;
  var thumb = '';
  if (thumbVal) {
    var tv = String(thumbVal).trim();
    if (/^https?:\/\//.test(tv) || tv.charAt(0) === '/') {
      thumb = '<img loading="lazy" class="card-thumb" src="'+esc(tv)+'" alt="'+esc(p.Title)+'" onerror="this.parentElement.innerHTML=\'<div class=card-thumb-placeholder style=background:linear-gradient(135deg,#553c9a,#805ad5)>✍️<\/div>\'">';
    } else if (isEmoji(tv)) {
      thumb = '<div class="card-thumb-placeholder" style="background:linear-gradient(135deg,#553c9a,#805ad5)">'+esc(tv)+'</div>';
    } else {
      thumb = '<div class="card-thumb-placeholder" style="background:linear-gradient(135deg,#553c9a,#805ad5)">✍️</div>';
    }
  } else {
    thumb = '<div class="card-thumb-placeholder" style="background:linear-gradient(135deg,#553c9a,#805ad5)">✍️</div>';
  }
  var tags = p.Tags ? p.Tags.split(",").map(function(t){ t=t.trim(); return t?'<a class="tag-pill" style="font-size:.7rem" href="#" onclick="event.preventDefault();setBlogTag(\''+esc(t)+'\')">'+esc(t)+'</a>':""}).join("") : "";
  return '<div class="card resource-card"'+(canOpen?' style="cursor:pointer" onclick="route(\'post\',{id:\''+esc(p.ID)+'\'})"':'')+'>'+thumb+
    '<div class="card-body">'+
    '<h3 class="card-title">'+esc(p.Title)+'</h3>'+
    '<p class="card-desc">'+esc(excerpt)+(excerpt.length>=115?"…":"")+'</p>'+
    '<div class="resource-tags">'+
    (p.PDFLink ? '<span class="badge badge-success">PDF</span>' : '')+
    '</div>'+
    (tags?'<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px">'+tags+'</div>':'')+
    '<div class="card-footer resource-card-footer">'+
    '<span class="card-meta">📅 '+esc(fmtDate(p.CreatedDate))+'</span>'+
    '<button class="btn btn-primary btn-sm"'+(canOpen?' onclick="event.stopPropagation();route(\'post\',{id:\''+esc(p.ID)+'\'})"':' disabled')+'>'+(canOpen?'Read':'Unavailable')+'</button>'+
    '</div></div></div>';
}

function pageSearch(opts) {
  if (opts) _sState.q = (opts.q || "").trim();

    '<button class="btn btn-primary" onclick="runGlobalSearch()">Search</button>' +
    (_sState.q ? '<button class="btn btn-ghost" onclick="route(\'search\',{q:\'\'})">Clear</button>' : '') +
    '</div>' +
    '<div id="gs-out"><div class="spinner"></div></div>' +
    '</div></section>';

  initAC("gs-srch", "gs-ac");
  var inp = document.getElementById("gs-srch");
  if (inp) inp.addEventListener("keydown", function(e) { if (e.key === "Enter") runGlobalSearch(); });

  if (!_sState.q) {
    document.getElementById("gs-out").innerHTML = '<div class="empty"><div class="empty-icon">🧭</div><p>Type keywords to search all sections.</p></div>';
    return;
  }

  apiAsync("search", { q: _sState.q, limit: 12 }).then(function(res) {
    var total = (res.courses||[]).length + (res.posts||[]).length + (res.references||[]).length + (res.careerLabs||[]).length;
    var html = '<p style="margin-bottom:24px;color:var(--muted)">Found '+total+' result'+(total===1?'':'s')+' for <strong>"'+esc(_sState.q)+'"</strong>.</p>';

    function block(title, icon, rows, page, cardFn) {
      if (!rows || !rows.length) return '';
      return '<div class="reveal-up" style="margin-bottom:38px">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px">' +
        '<h2 style="margin:0;font-size:1.45rem">'+icon+' '+title+'</h2>' +
        '<button class="btn btn-ghost" onclick="route(\''+page+'\',{q:\''+esc(_sState.q)+'\'})">Open '+title+' →</button>' +
        '</div>' +
        '<div class="grid-3">'+rows.map(cardFn).join('')+'</div></div>';
    }

    html += block("Courses", "📚", res.courses, "courses", courseCard);
    html += block("Blog Posts", "✍️", res.posts, "blog", postCard);
    html += block("References", "📎", res.references, "references", referenceCard);
    html += block("Career Labs", "🧠", res.careerLabs, "career-lab", careerLabCard);

    if (total === 0) html += '<div class="empty"><div class="empty-icon">📭</div><p>No results found. Try a different keyword.</p></div>';
    document.getElementById("gs-out").innerHTML = html;
    initRevealMotion(document.getElementById("gs-out"));
  }).catch(defaultErr);
}

  initAC("c-srch", "c-ac");

  apiAsync("courses", { search: _cState.q, category: _cState.category, grade: _cState.grade, offset: _cState.offset, limit: PAGE_SIZE }).then(function(result) {

    if (cnt) {
      cnt.textContent = result.total
        ? "Showing "+(_cState.offset+1)+"–"+end+" of "+result.total+" courses"+(_cState.q?' matching "'+_cState.q+'"':"")+(_cState.category?" in "+_cState.category:"")+(_cState.grade?" · "+_cState.grade:"")

      ? result.rows.map(courseCard).join("")
      : '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">📭</div><p>No courses found. <a href="#" onclick="clearCourseFilter()">Reset</a></p></div>';

    renderPagination("c-pages", result.total, _cState.offset, function(off) { _cState.offset = off; pageCourses(); });
    apiAsync("home", {}).then(function(meta) {
      var sel = document.getElementById("c-cat");
      if (sel && meta.categories) {
        meta.categories.forEach(function(cat) {
          var opt = document.createElement("option");
          opt.value = cat; opt.textContent = cat;
          if (_cState.category === cat) opt.selected = true;
          sel.appendChild(opt);
        });
      }
    }).catch(function(){});
  }).catch(defaultErr);
}

function drawBarChart(canvas, data) {
  var keys = Object.keys(data);
  if (!keys.length) { canvas.style.display="none"; return; }
  var ctx = canvas.getContext("2d");
  var W   = canvas.offsetWidth || 500;
  canvas.width = W; canvas.height = 120;
  var bW = (W - 40) / keys.length - 8;
  var max = Math.max.apply(null, keys.map(function(k){ return data[k]; }));
  var clrs = ["#1e3a5f","#2d6a9f","#f0b429","#2f855a","#c53030","#553c9a","#dd6b20"];
  keys.forEach(function(key, i) {
    var val = data[key];
    var bh  = Math.round((val / max) * 80);
    var x   = 20 + i * (bW + 8);
    var y   = 100 - bh;
    ctx.fillStyle = clrs[i % clrs.length];
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(x, y, bW, bh, 4); else ctx.rect(x, y, bW, bh);
    ctx.fill();
    ctx.fillStyle = "#1a202c"; ctx.font = "11px sans-serif"; ctx.textAlign = "center";
    ctx.fillText(key.slice(0,10), x + bW/2, 115);
    ctx.fillStyle = "#fff";
    ctx.fillText(val, x + bW/2, y + 14);
  });
}

    '<input id="p-pdf" class="form-control" value="'+v("PDFLink")+'" placeholder="https://drive.google.com/file/d/…">' +
    '<div class="form-hint">Upload a PDF or paste a Google Drive share link.</div>' +
    '</div></div>' +
    '<div class="form-group"><label class="form-label">Tags <span class="form-hint">(comma-separated)</span></label>' +
    '<input id="p-tags" class="form-control" value="'+v("Tags")+'" placeholder="interview, career, tips"></div>' +
    '<div class="form-group"><label class="form-label">Content <span class="req">*</span></label>' +
    '<div class="toolbar">'+toolbarHTML+'</div>' +
    '<div id="p-content" class="editor" contenteditable="true">'+(isEdit&&post.Content?post.Content:"")+'</div></div>' +
    '<div class="form-group"><label class="form-label">Status</label>' +
    '<select id="p-status" class="form-control">' +
    '<option value="Draft"'+(isEdit&&post.Status==="Draft"?" selected":"")+'>Draft</option>' +
    '<option value="Published"'+(isEdit&&post.Status==="Published"?" selected":"")+'>Published</option>' +
    '</select></div>' +
    '<div style="display:flex;gap:10px;margin-top:8px">' +
    '<button class="btn btn-primary" onclick="submitPost()">💾 Save Post</button>' +
    '<button class="btn btn-ghost" onclick="route(\'staff\')">Cancel</button>' +
    '</div></div></div></div></section>';
}

function submitPost() {
  var idEl = document.getElementById("p-id");
  var payload = {
    id:              idEl ? idEl.value : "",
    title:           (document.getElementById("p-title")  ||{}).value || "",
    featuredImageUrl:(document.getElementById("p-img")    ||{}).value || "",
    pdfLink:         (document.getElementById("p-pdf")    ||{}).value || "",
    tags:            (document.getElementById("p-tags")   ||{}).value || "",
    content:         (document.getElementById("p-content")||{}).innerHTML || "",
    status:          (document.getElementById("p-status") ||{}).value || "Draft",
  };
  if (!payload.title.trim())   { toast("Title is required.", "err"); return; }
  if (!stripHtml(payload.content||"")) { toast("Content is required.", "err"); return; }
  apiPost("savePost", {data: payload}, function() { toast("Post saved! 🎉"); route("staff"); });
}
</script>
</body>
</html>
